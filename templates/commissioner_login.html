{% extends "base.html" %}
{% block title %}Commissioner Login{% endblock %}
{% block content %}
<section style="max-width:400px;margin:80px auto;padding:0 1rem;">
  <p class="eyebrow" style="text-align:center;">Commissioner Console</p>
  <h1 style="text-align:center;margin-bottom:1.5rem;">Sign In</h1>
  <div class="panel" style="padding:2rem;">
    <form method="post">
      <input type="hidden" name="next" value="{{ next }}">
      <label style="display:block;font-size:0.8rem;font-weight:700;text-transform:uppercase;
                    letter-spacing:.07em;color:var(--muted);margin-bottom:6px;">Password</label>
      <input type="password" name="password" autofocus
             style="width:100%;margin-bottom:1rem;font-size:1rem;"
             placeholder="Commissioner password">
      <button type="submit" style="width:100%;">Enter Console</button>
    </form>
  </div>
</section>
{% endblock %}
